<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <div class="container">
      <h1>Tic Tac Toe</h1>

      <div class="form">
        <form method="get">
          <div class="player-1">
            <label for="player1">Player 1</label>
            <input id="player1" type="text" placeholder="Enter Name" />
          </div>
          <br />
          <div class="player-2">
            <label for="player2">Player 2</label>
            <input id="player2" type="text" placeholder="Enter Name" />
          </div>
          <br />
          <button id="submit" type="submit">Start Game</button>
        </form>
      </div>

      <div class="message"></div>
      <br />

      <div class="grid" style="display: none">

    <div id="1" class="cell"></div>
    <div id="2" class="cell"></div>
    <div id="3" class="cell"></div>

    <div id="4" class="cell"></div>
    <div id="5" class="cell"></div>
    <div id="6" class="cell"></div>

    <div id="7" class="cell"></div>
    <div id="8" class="cell"></div>
    <div id="9" class="cell"></div>

</div>
    </div>
	
	<script type="text/javascript" src="./script.js">
</script>

</body>

</html>
